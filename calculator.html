<!Doctype html>
<html>
<head>
<title>Calculator</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh:
background:blue;
}

.calculator{
width:320px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}


#display{
width:100%;
height:60px;
font-size:24px;
text-align:right;
margin-bottom:10px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
padding:15px;
font-size:20px;
cursor:pointer;
border-radius:25px;
}
</style>
</head>

<body>
<div class="calculator">
  <input type="text"id="display"readonly>
 <div class="buttons">
   <button onclick="clearDisplay()">AC</button>
   <button onclick="deleteLast()">❌</button>
   <button onclick="append('%')">%</button>
   <button onclick="append('*')">*</buton>
   
    
    <button onclick="append('7')">7</buton>
    <button onclick="append('8')">8</buton>
    <button onclick="append('9')">9</buton>
    <button onclick="append('-')">-</buton>

    <button onclick="append('4')">4</buton>
    <button onclick="append('5')">5</buton>
    <button onclick="append('6')">6</buton>
    <button onclick="append('+')">+</buton>

    <button onclick="append('1')">1</buton>
    <button onclick="append('2')">2</buton>
    <button onclick="append('3')">3</buton>
    <button onclick="append('/')">/</buton>

    <button onclick="append('00')">00</buton>
    <button onclick="append('0')">0</buton>
    <button onclick="append('.')">.</buton>  
    <button onclick="calculate()">=</buton> 
  </div>
</div>

<script src="script.js"></script>


</body>
</html>
